# Acronym expansions (always applied, no synonym lookup needed)
acronyms:
  TDL: "Tourism Development Levy"
  SLTDA: "Sri Lanka Tourism Development Authority"
  SLBFE: "Sri Lanka Bureau of Foreign Employment"
  BOI: "Board of Investment"
  VAT: "Value Added Tax"
  EIA: "Environmental Impact Assessment"
  MOH: "Ministry of Health"
  UDA: "Urban Development Authority"
  NHDA: "National Housing Development Authority"
