name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Dummy values — pydantic-settings requires these fields present.
  # All external calls (DB, Qdrant, Gemini) are fully mocked in tests.
  POSTGRES_URL: "postgresql+asyncpg://test:test@localhost:5432/sltda_test"
  QDRANT_URL: "http://localhost:6333"
  GEMINI_API_KEY: "ci-dummy-key"

jobs:
  # ── Job 1: Unit + Smoke + Integration tests ───────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run smoke tests
        run: pytest tests/smoke/smoke_tests.py tests/smoke/load_test.py -v --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

  # ── Job 2: Dependency security audit ─────────────────────────────────────────
  security-audit:
    name: pip-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Audit installed dependencies for known vulnerabilities
        # Exits non-zero if any CVEs are found — fails the job intentionally.
        # To ignore a specific vulnerability: pip-audit --ignore-vuln PYSEC-XXXX-XXXX
        run: pip-audit
